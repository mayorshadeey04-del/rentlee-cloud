<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentlee | Set New Password</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Your CSS -->
    <link rel="stylesheet" href="./css/set-password.css">
</head>

<body>

<div class="container">
    
    <!-- Logo -->
    <div class="logo">
        <img src="./image/logo.png" alt="Rentlee Logo">
    </div>

    <div class="icon-box">
        <i class="fa-solid fa-lock-open"></i>
    </div>

    <h1>Set New Password</h1>
    <p class="subtitle">
        Please create a strong password for your account
    </p>

    <form id="setPasswordForm" novalidate>

        <div class="input-box">
            <label>New Password</label>
            <input type="password" id="password" placeholder="Enter new password" required>
            <i class="fa fa-eye toggle" onclick="togglePassword('password', this)"></i>
            <small class="error"></small>
        </div>

        <div class="input-box">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            <i class="fa fa-eye toggle" onclick="togglePassword('confirmPassword', this)"></i>
            <small class="error"></small>
        </div>

        <!-- Password Requirements -->
        <div class="requirements">
            <p class="requirements-title">Password must contain:</p>
            <ul>
                <li id="req-length">
                    <i class="fa-solid fa-circle-check"></i>
                    At least 8 characters
                </li>
                <li id="req-uppercase">
                    <i class="fa-solid fa-circle-check"></i>
                    One uppercase letter
                </li>
                <li id="req-lowercase">
                    <i class="fa-solid fa-circle-check"></i>
                    One lowercase letter
                </li>
                <li id="req-number">
                    <i class="fa-solid fa-circle-check"></i>
                    One number
                </li>
            </ul>
        </div>

        <button type="submit">Reset Password</button>

    </form>

    <div class="back-link">
        <a href="login.html">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </a>
    </div>

</div>

<!-- JavaScript -->
<script src="./js/set-password.js"></script>

</body>
</html>
