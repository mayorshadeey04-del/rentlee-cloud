<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentlee | Verify Email</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Your CSS -->
    <link rel="stylesheet" href="./css/otp-verification.css">
</head>

<body>

<div class="container">
    
    <!-- Logo -->
    <div class="logo">
        <img src="./image/logo.png" alt="Rentlee Logo">
    </div>

    <div class="icon-box">
        <i class="fa-solid fa-envelope-circle-check"></i>
    </div>

    <h1>Verify Your Email</h1>
    <p class="subtitle">
        We've sent a 6-digit verification code to <br>
        <strong id="userEmail">your email</strong>
    </p>

    <form id="otpForm" novalidate>

        <div class="otp-input-container">
            <input type="text" maxlength="6" class="otp-input" id="otpCode" placeholder="000000" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" />
        </div>

        <small class="error" id="otpError"></small>

        <button type="submit" id="verifyBtn">Verify & Continue</button>

    </form>

    <div class="resend-section">
        <p>Didn't receive the code?</p>
        <button type="button" class="resend-btn" id="resendBtn" disabled>
            Resend Code <span id="timer">(60s)</span>
        </button>
    </div>

    <div class="back-link">
        <a href="signup.html">
            <i class="fa-solid fa-arrow-left"></i> Back to Signup
        </a>
    </div>

</div>

<!-- Success Popup -->
<div class="popup" id="successPopup">
    <div class="popup-content">
        <div class="popup-icon success-icon">
            <i class="fa-solid fa-check"></i>
        </div>
        <h3>Email Verified Successfully!</h3>
        <p>You can now log in to your account.</p>
        <button class="popup-btn" onclick="closeSuccessPopup()">Continue to Login</button>
    </div>
</div>

<!-- Error Popup -->
<div class="popup" id="errorPopup">
    <div class="popup-content">
        <div class="popup-icon error-icon">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <h3 id="errorTitle">Error</h3>
        <p id="errorMessage">Something went wrong</p>
        <button class="popup-btn" onclick="closeErrorPopup()">Try Again</button>
    </div>
</div>

<!-- Info Popup (for resend confirmation) -->
<div class="popup" id="infoPopup">
    <div class="popup-content">
        <div class="popup-icon info-icon">
            <i class="fa-solid fa-envelope"></i>
        </div>
        <h3>Code Sent!</h3>
        <p id="infoMessage">A new verification code has been sent to your email.</p>
        <button class="popup-btn" onclick="closeInfoPopup()">OK</button>
    </div>
</div>

<!-- JavaScript -->
<script src="./js/otp-verification.js"></script>

</body>
</html>
